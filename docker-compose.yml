services:
  db:
    image: mariadb:12
    container_name: sams-wordpress-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./wordpress/db:/var/lib/mysql
    networks:
      - local-sams-network

  wordpress:
    depends_on:
      - db
    image: wordpress:6.9
    container_name: sams-wordpress
    restart: unless-stopped
    ports:
      - "${WP_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${DB_NAME}
      WORDPRESS_DB_USER: ${DB_USER}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      # - ./wordpress:/var/www/html
      # - ./themes:/var/www/html/wp-content/themes
      - ./release-plugin-directory/trunk:/var/www/html/wp-content/plugins/sams-integration
    networks:
      - local-sams-network

  phpmyadmin:
    depends_on:
      - db
    image: phpmyadmin/phpmyadmin:latest
    container_name: sams-phpmyadmin
    restart: unless-stopped
    ports:
      - "${PMA_PORT}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    networks:
      - local-sams-network

volumes:
  sams_plugin_data:
  db_data:
  wp_data:

networks:
  local-sams-network:
    driver: bridge
